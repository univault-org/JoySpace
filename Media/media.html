      // Update the YouTubePlayer component to handle state persistence
      function YouTubePlayer({
        videoId,
        onStateChange,
        className,
        startTime = 0,
      }) {
        const playerRef = React.useRef(null);
        const playerInstanceRef = React.useRef(null);

        React.useEffect(() => {
          // Initialize player
          playerInstanceRef.current = new YT.Player(playerRef.current, {
            videoId: videoId,
            playerVars: {
              autoplay: 1, // Enable autoplay
              start: Math.floor(startTime), // Start from saved time
              modestbranding: 1,
              rel: 0,
              showinfo: 0,
            },
            events: {
              onStateChange: (event) => {
                if (onStateChange) {
                  onStateChange(event);
                }
              },
            },
          });

          return () => {
            if (playerInstanceRef.current) {
              playerInstanceRef.current.destroy();
            }
          };
        }, [videoId]);

        return (
          <div className={className}>
            <div ref={playerRef} className="w-full h-full" />
          </div>
        );
      }

          const minutes = Math.floor(seconds / 60);
          const remainingSeconds = Math.floor(seconds % 60);
          return `${minutes}:${remainingSeconds.toString().padStart(2, "0")}`;
        };

        const handleSaveNote = () => {
          // Add your save logic here
          console.log("Saving note:", {
            noteText,
            timestamp: currentTime,
            videoId,
          });
          setNoteText("");
          setIsDraft(false);

        const handleKeyDown = (e) => {

            handleSaveNote();
          }

      // Update the App component to track video state

        });

          const newState = {
            isPlaying: event.data === YT.PlayerState.PLAYING,
            currentTime: videoStateRef.current?.getCurrentTime() || 0,
          };
          setVideoState(newState);
        };

        // Handle PIP mode toggle
        const handlePipClick = () => {
          // Save current video state before switching to PIP
          if (videoStateRef.current) {
            setVideoState({
              isPlaying:
                videoStateRef.current.getPlayerState() ===
                YT.PlayerState.PLAYING,
              currentTime: videoStateRef.current.getCurrentTime() || 0,
            });
          }
          setIsPipMode(true);
        };

          setIsPipMode(false);
          // Optional: Add any additional state cleanup or transitions here
        };

                              <i className="bi bi-pencil"></i>
                            </button>

                          {/* Title */}

                                {tag}
                              </span>
                            ))}

                        </div>
                      ))}

                    videoId={currentVideo.id}

                    onStateChange={(e) => {
                      handleVideoStateChange(e);
                      videoStateRef.current = e.target;
                    }}
                    startTime={videoState.currentTime}
                  />
                  <div className="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-4">

                      className="w-12 h-12 rounded-full bg-black/60 text-white flex items-center justify-center backdrop-blur-sm transform transition-all duration-200 hover:scale-110 active:scale-95 hover:bg-black/80"
                    >
                      <i className="bi bi-pip text-xl"></i>

                }}
                onExitPip={handleExitPip}
              />
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
