      // Format duration from seconds to MM:SS or HH:MM:SS
      function formatDuration(seconds) {
        if (!seconds) return "00:00";

        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const remainingSeconds = Math.floor(seconds % 60);

        // If video is longer than an hour, include hours
        if (hours > 0) {
          return `${hours}:${minutes
            .toString()
            .padStart(2, "0")}:${remainingSeconds.toString().padStart(2, "0")}`;
        }

        // Otherwise just show minutes and seconds
        return `${minutes}:${remainingSeconds.toString().padStart(2, "0")}`;
      }

      // Format file size from bytes to human readable format
      function formatSize(bytes) {
        if (!bytes) return "0 B";

        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));

        // Round to 1 decimal place
        const size = (bytes / Math.pow(1024, i)).toFixed(1);

        return `${size} ${sizes[i]}`;
      }

      function ThemeProvider({ children }) {
        const [isDark, setIsDark] = React.useState(true);

        const toggleTheme = () => {
          setIsDark(!isDark);
          localStorage.setItem("theme", !isDark ? "dark" : "light");
        };

        const theme = {
          light: {
            bg: "bg-white",
            text: "text-neutral-900",
            border: "border-neutral-200",
            sidebar: "bg-neutral-50",
            hover: "hover:bg-neutral-100",
            input: "bg-neutral-100",

            text: "text-neutral-50",
            border: "border-neutral-700",
            sidebar: "bg-neutral-800",
            hover: "hover:bg-neutral-700/50",
            input: "bg-neutral-700/50",
            button: "bg-neutral-700",
          },
        };

        React.useEffect(() => {
          const savedTheme = localStorage.getItem("theme");
          if (savedTheme) {
            setIsDark(savedTheme === "dark");
          }
        }, []);
        React.useEffect(() => {
          // Remove previous theme class
          document.body.classList.remove("bg-neutral-900", "bg-white");
          // Add new theme class
          document.body.classList.add(isDark ? "bg-neutral-900" : "bg-white");
        }, [isDark]);

        return (
          <ThemeContext.Provider value={{ isDark, toggleTheme, theme }}>
            <div
              className={`${isDark ? theme.dark.bg : theme.light.bg} ${
                isDark ? theme.dark.text : theme.light.text
              }`}
            >
              {children}
            </div>
          </ThemeContext.Provider>
        );
      }

      // Update the YouTubePlayer component to handle state persistence
      function YouTubePlayer({
        videoId,
        onStateChange,
        className,
        startTime = 0,
      }) {
        const playerRef = React.useRef(null);
        const playerInstanceRef = React.useRef(null);

        React.useEffect(() => {
          // Initialize player
          playerInstanceRef.current = new YT.Player(playerRef.current, {
            videoId: videoId,
            playerVars: {
              autoplay: 1, // Enable autoplay
              start: Math.floor(startTime), // Start from saved time
              modestbranding: 1,
              rel: 0,
              showinfo: 0,
            },
            events: {
              onStateChange: (event) => {
                if (onStateChange) {
                  onStateChange(event);
                }
              },
            },
          });

          return () => {
            if (playerInstanceRef.current) {
              playerInstanceRef.current.destroy();
            }
          };
        }, [videoId]);

        return (
          <div className={className}>
            <div ref={playerRef} className="w-full h-full" />
          </div>
        );
      }

            return newList;

                currentVideo={currentVideo}
                setCurrentVideo={(video) => {
                  setCurrentVideo(video);
                  if (isPipMode) setIsPipMode(false);
                }}
                mediaList={mediaList}
              />
            </div>

            {/* PIP Video - unchanged */}
            {isPipMode && (
              <PipVideo
                videoId={currentVideo.id}
                currentTime={videoState.currentTime}
                onStateChange={(e) => {
                  handleVideoStateChange(e);
                  videoStateRef.current = e.target;
                }}
                onExitPip={handleExitPip}
              />
            )}
          </div>
        );
      }

      // Main handler for Joyganizing videos
      async function handleJoyganize(files) {
        const results = [];
        const errors = [];

        // Progress state
        const [progress, setProgress] = React.useState(0);
        const [processing, setProcessing] = React.useState(false);

        try {
          setProcessing(true);

          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            try {
              // Get video metadata first (fast)
              const metadata = await extractVideoMetadata(file);

              // Generate thumbnail efficiently
              const thumbnail = await generateEfficientThumbnail(
                file,
                metadata
              );

              // Create entry
              const videoEntry = {
                id: Date.now().toString(),
                title: file.name,
                path: `./videos/${file.name}`,
                thumbnailPath: `./thumbnails/${file.name.replace(
                  /\.[^/.]+$/,
                  ""
                )}_thumb.jpg`,
                duration: metadata.duration,
                size: metadata.size,
                created: metadata.lastModified,
                thumbnail: thumbnail,
                tags: [],
                notes: "",
              };

              results.push(videoEntry);
              setProgress(((i + 1) / files.length) * 100);
            } catch (error) {
              console.error(`Error processing ${file.name}:`, error);
              errors.push({ file: file.name, error });
            }
          }

          return { results, errors };
        } finally {
          setProcessing(false);
        }
      }

      // Efficient thumbnail generation
      async function generateEfficientThumbnail(file, metadata) {
        return new Promise((resolve, reject) => {
          const video = document.createElement("video");
          video.preload = "metadata";

          let videoURL = null;
          let thumbnailGenerated = false;
          let timeoutId = null;

          const cleanup = () => {
            if (timeoutId) clearTimeout(timeoutId);
            if (videoURL) URL.revokeObjectURL(videoURL);
            if (video) video.remove();
          };

          const generateThumb = () => {
            if (thumbnailGenerated) return;

            try {
              const canvas = document.createElement("canvas");
              canvas.width = 320;
              canvas.height = 180;

              const ctx = canvas.getContext("2d");
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

              // Convert to base64 string
              const base64Data = canvas.toDataURL("image/jpeg", 0.7);
              thumbnailGenerated = true;

              cleanup();
              canvas.remove();

              resolve(base64Data);
            } catch (error) {
              cleanup();
              reject(
                new Error(`Thumbnail generation failed: ${error.message}`)
              );
            }
          };

          video.onloadedmetadata = () => {
            const thumbTime = Math.min(video.duration * 0.01, 10);
            video.currentTime = thumbTime;
          };

          video.onseeked = generateThumb;

          video.onerror = (error) => {
            cleanup();
            reject(new Error(`Video load failed: ${error.message}`));
          };

          try {
            videoURL = URL.createObjectURL(file);
            video.src = videoURL;

            timeoutId = setTimeout(() => {
              if (!thumbnailGenerated) {
                cleanup();
                reject(new Error("Thumbnail generation timed out"));
              }
            }, 30000);
          } catch (error) {
            cleanup();
            reject(new Error(`URL creation failed: ${error.message}`));
          }
        });
      }

      // Fast metadata extraction
      async function extractVideoMetadata(file) {
        return new Promise((resolve, reject) => {
          const video = document.createElement("video");
          video.preload = "metadata";

          video.onloadedmetadata = () => {
            const metadata = {
              duration: video.duration,
              width: video.videoWidth,
              height: video.videoHeight,
              size: file.size,
              lastModified: new Date(file.lastModified),
              type: file.type,
            };

            video.remove();
            resolve(metadata);
          };

          video.onerror = () => {
            video.remove();
            reject(new Error("Failed to load video metadata"));
          };

          video.src = URL.createObjectURL(file);
        });
      }

      // Progress UI Component
      function ProcessingProgress({ progress, processing }) {
        return (
          <div
            className={`fixed bottom-4 right-4 p-4 rounded-lg shadow-lg
            ${isDark ? "bg-neutral-800" : "bg-white"}
            transition-all duration-300 transform
            ${
              processing
                ? "translate-y-0 opacity-100"
                : "translate-y-10 opacity-0"
            }`}
          >
            <div className="flex items-center gap-3">
              <div className="w-40 h-2 bg-neutral-200 rounded-full overflow-hidden">
                <div
                  className="h-full bg-primary-500 transition-all duration-300"
                  style={{ width: `${progress}%` }}
                />
              </div>
              <span className="text-sm text-neutral-500">
                {Math.round(progress)}%
              </span>
            </div>
          </div>
        );
      }

      function Root() {
        return (
          <ThemeProvider>
            <App />
          </ThemeProvider>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Root />);
    </script>
  </body>
</html>
